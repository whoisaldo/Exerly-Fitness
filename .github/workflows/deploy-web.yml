name: Deploy Web

on:
  push:
    branches: [main]
    paths: [apps/web/**, .github/workflows/deploy-web.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --workspace=apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          VITE_API_URL: https://exerly-fitness-93dyl.ondigitalocean.app
          VITE_ADMIN_EMAILS: whois.younes@gmail.com

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
